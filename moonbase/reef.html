const sh=PROF.shells; const xs=sh.map(s=>s[0]),hs=sh.map(s=>s[1]); const xmax=Math.max(...xs),hmax=Math.max(...hs);
function X(v){return P+(v/xmax)*(W-P-6);} function Y(v){return H-P-(v/hmax)*(H-P-8);}
x.strokeStyle='#2a3a4a';x.beginPath();x.moveTo(P,8);x.lineTo(P,H-P);x.lineTo(W-4,H-P);x.stroke();
// staircase
x.strokeStyle='#ff8c42';x.lineWidth=2;x.beginPath();
for(let i=0;i<sh.length;i++){const px=X(xs[i]),py=Y(hs[i]); if(i===0)x.moveTo(px,py); else {x.lineTo(X(xs[i]),Y(hs[i-1]));x.lineTo(px,py);} }
x.stroke();
// points + heat color dots
for(let i=0;i<sh.length;i++){const c= hs[i]<0.25?'#2a6cff':hs[i]<0.5?'#ffffff':'#ff4020'; x.fillStyle=c;x.beginPath();x.arc(X(xs[i]),Y(hs[i]),3,0,7);x.fill();}
// mark crystal boundary
x.strokeStyle='#10b0ff';x.setLineDash([3,3]);x.beginPath();x.moveTo(X(PROF.crystal_halfwidth),8);x.lineTo(X(PROF.crystal_halfwidth),H-P);x.stroke();x.setLineDash([]);
x.fillStyle='#9fb';x.font='9px monospace';x.fillText('shell (dist)',W-66,H-8);x.save();x.translate(8,H/2);x.rotate(-Math.PI/2);x.fillText('heat',0,0);x.restore();
document.getElementById('pcap').innerHTML='2 steps: C3\u2192C2 (+0.18) \u00b7 C2\u2192C1 (+0.51). Flat plateaus = regimes.';
})();
</script>
