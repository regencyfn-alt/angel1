<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Chrome hemisphere — polished, anti-symmetric ground state visual cue -->
  <defs>
    <!-- Main hemisphere — chrome with light from top-left -->
    <radialGradient id="chrome" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#E8ECEF"/>
      <stop offset="50%" stop-color="#A0A8B0"/>
      <stop offset="80%" stop-color="#3A4148"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <!-- Specular highlight — the bright crescent on top-left -->
    <radialGradient id="spec" cx="32%" cy="22%" r="25%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom rim glow — the cerise echo at base, tying to brand -->
    <radialGradient id="rim" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#DE3163" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#DE3163" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#DE3163" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background disc -->
  <circle cx="32" cy="32" r="30" fill="#0d1117"/>

  <!-- Hemisphere body -->
  <circle cx="32" cy="32" r="28" fill="url(#chrome)"/>

  <!-- Bottom rim glow -->
  <circle cx="32" cy="32" r="28" fill="url(#rim)"/>

  <!-- Specular highlight -->
  <ellipse cx="22" cy="20" rx="9" ry="6" fill="url(#spec)"/>

  <!-- Subtle equator line — the Chronomic edge -->
  <ellipse cx="32" cy="32" rx="28" ry="3" fill="none" stroke="#FFFFFF" stroke-width="0.4" stroke-opacity="0.18"/>

  <!-- Outer ring — defines the disc cleanly at small sizes -->
  <circle cx="32" cy="32" r="29.5" fill="none" stroke="#2a3444" stroke-width="0.6"/>
</svg>
