# Michronics Worker — wrangler.toml
# Manual deploy from Shane's laptop only. No GitHub Actions.
# Custom domain explicit so wrangler shows zero drift on every deploy.

name = "michronics-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "144f01203b94481323e0afa2cbbdddda"

# ── Routes — explicit so deploy never strips them ──
[[routes]]
pattern = "api.michronics.com"
zone_name = "michronics.com"
custom_domain = true

# ── KV — Michronics-only namespace ──
[[kv_namespaces]]
binding = "MICHRON_KV"
id = "d43d1057f20445b88a8373b84f9765e3"

# ── Workers AI — for Llama 70B face firings ──
[ai]
binding = "AI"

# ── Environment vars (non-secret) ──
[vars]
ENVIRONMENT = "production"

# Secrets (set via `wrangler secret put` from your laptop, never in git):
#   ANTHROPIC_API_KEY    — D9 synthesis on Opus
#   NVIDIA_API_KEY       — Llama 70B / Nemotron faces
#   PHYSICS_KEY          — auth header X-Physics-Key for /physics/* endpoints
#   GITHUB_PAT           — only if batch_runner needs to fetch canon from GitHub
